spring:
  data:
    rest:
      base-path: /api/v1
      default-page-size: 20
      return-body-on-create: true
      return-body-on-update: true
  datasource:
    url: jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:financial_db}
    username: ${PGUSER:postgres}
    password: ${PGPASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  jackson:
    default-property-inclusion: non_null
    date-format: yyyy-MM-dd
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${SERVER_PORT:9000}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
  info:
    title: Mini Sistema Financiero - Flypass
    description: API REST para gestión de clientes, cuentas bancarias y transacciones
    version: 1.0.0

logging:
  level:
    com.flypass: INFO
    org.springframework: WARN
