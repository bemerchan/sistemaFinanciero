kind = "web"
previewPath = "/"
title = "Mini Sistema Financiero - Flypass"
version = "1.0.0"
id = "artifacts/financial-frontend"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24069

[services.development]
run = "pnpm --filter @workspace/financial-frontend run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/financial-frontend", "run", "build" ]
publicDir = "artifacts/financial-frontend/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24069"
BASE_PATH = "/"
